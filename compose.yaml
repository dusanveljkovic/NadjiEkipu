services:
  mariadb:
    image: mariadb:latest
    container_name: mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: nadji_ekipu
      MYSQL_USER: myuser
      MYSQL_PASSWORD: mypassword
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      # Official image auto-runs any *.sql it finds here, in filename
      # order, but ONLY the very first time (i.e. when the volume above
      # is empty). This replaces the manual `docker exec ... < *.sql` step.
      - ./baza/create_dbW.sql:/docker-entrypoint-initdb.d/01-create_dbW.sql:ro
      - ./baza/seedW.sql:/docker-entrypoint-initdb.d/02-seedW.sql:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_NAME: nadji_ekipu
      DB_USER: root
      DB_PASSWORD: rootpassword
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: "redis://redis:6379/0"
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mariadb_data: